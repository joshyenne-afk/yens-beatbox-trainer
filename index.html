<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<title>YEN's Beatbox Trainer — Linearizer</title>
<style>
  :root{
    --bg:#0a0a0c; --panel:#15151a; --panel2:#1f1f27;
    --txt:#f4f4f6; --dim:#8a8a96; --line:#2c2c36;
    --kick:#ff5b3a; --snare:#ffd23a; --hat:#3ad6ff; --open:#9b8cff; --rest:#3a3a44;
    --go:#27d07a; --stop:#ff4d4d; --accent:#ffb43a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    overflow:hidden; user-select:none; -webkit-user-select:none;
    display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .hide{display:none!important}

  /* ---- Header ---- */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px; border-bottom:1px solid var(--line); flex:0 0 auto;
  }
  .logo{font-size:18px; font-weight:800; letter-spacing:.5px}
  .logo span{color:var(--accent)}
  .menu-btn{
    background:var(--panel2); border:1px solid var(--line); color:var(--txt);
    font-size:17px; font-weight:700; padding:14px 20px; border-radius:14px;
    min-width:118px;
  }

  /* ---- Main player ---- */
  main{flex:1 1 auto; display:flex; flex-direction:column; min-height:0}
  .now{
    padding:16px 18px 6px; text-align:center; flex:0 0 auto;
  }
  .now .name{font-size:30px; font-weight:800; line-height:1.05}
  .now .meta{font-size:16px; color:var(--dim); margin-top:6px; font-weight:600}

  /* ---- The karaoke sentence (the product) ---- */
  .stage{
    flex:1 1 auto; display:flex; align-items:center; justify-content:center;
    padding:8px 14px; min-height:0; overflow:hidden;
  }
  .line{
    display:flex; flex-wrap:wrap; gap:8px 10px; align-items:center;
    justify-content:center; max-width:760px;
  }
  .syl{
    font-size:34px; font-weight:800; padding:14px 16px; border-radius:14px;
    background:var(--panel); border:2px solid var(--line); color:var(--dim);
    transition:transform .04s ease, background .04s ease, color .04s ease, border-color .04s ease;
    line-height:1; min-width:54px; text-align:center;
  }
  .syl.k{border-color:var(--kick)} .syl.s{border-color:var(--snare)}
  .syl.h{border-color:var(--hat)} .syl.o{border-color:var(--open)}
  .syl.rest{opacity:.32; font-size:24px; min-width:30px; padding:14px 8px}
  .syl.on{
    color:#0a0a0c; transform:scale(1.16); border-color:transparent;
  }
  .syl.on.k{background:var(--kick)} .syl.on.s{background:var(--snare)}
  .syl.on.h{background:var(--hat)} .syl.on.o{background:var(--open)}
  .syl.muted{opacity:.16}

  /* ---- Transport ---- */
  .transport{flex:0 0 auto; padding:6px 16px 14px}
  .play{
    width:100%; height:96px; border:none; border-radius:22px;
    font-size:30px; font-weight:900; letter-spacing:1px; color:#06120c;
    background:var(--go); display:flex; align-items:center; justify-content:center; gap:14px;
  }
  .play.playing{background:var(--stop); color:#1a0606}
  .row{display:flex; gap:12px; margin-top:12px}
  .row > *{flex:1}
  .bigbtn{
    height:78px; border:1px solid var(--line); background:var(--panel2);
    color:var(--txt); font-size:20px; font-weight:800; border-radius:18px;
  }
  .bigbtn:active{background:var(--panel)}
  .tempo{
    display:flex; align-items:center; gap:12px; margin-top:12px;
  }
  .tempo .tval{
    flex:1; text-align:center; font-size:26px; font-weight:800;
  }
  .tempo .tval small{display:block; font-size:13px; color:var(--dim); font-weight:600; margin-top:2px}
  .tbtn{
    width:88px; height:78px; font-size:34px; font-weight:900;
    border:1px solid var(--line); background:var(--panel2); color:var(--txt); border-radius:18px;
  }
  .tbtn:active{background:var(--panel)}

  /* ---- Stage (build-up) selector ---- */
  .stages{display:flex; gap:8px; margin-top:12px}
  .stages button{
    flex:1; height:64px; border:1px solid var(--line); background:var(--panel);
    color:var(--dim); font-size:16px; font-weight:800; border-radius:14px;
  }
  .stages button.sel{background:var(--accent); color:#1a1206; border-color:transparent}

  /* ---- Slide-over panels ---- */
  .panel{
    position:fixed; inset:0; background:var(--bg); z-index:50;
    display:flex; flex-direction:column;
    transform:translateX(100%); transition:transform .22s ease;
  }
  .panel.open{transform:translateX(0)}
  .panel header .menu-btn{min-width:96px}
  .panel-body{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:10px 16px 30px}
  .glist button{
    width:100%; text-align:left; background:var(--panel); border:1px solid var(--line);
    color:var(--txt); border-radius:16px; padding:20px; margin-bottom:12px;
  }
  .glist button.sel{border-color:var(--accent)}
  .glist .gn{font-size:21px; font-weight:800}
  .glist .gm{font-size:15px; color:var(--dim); margin-top:5px; font-weight:600}
  .ghdr{font-size:14px; font-weight:800; color:var(--accent); text-transform:uppercase;
        letter-spacing:1.5px; margin:18px 4px 10px}
  .teach h3{font-size:17px; color:var(--accent); margin:20px 0 8px; font-weight:800}
  .teach p{font-size:17px; line-height:1.5; color:var(--txt); margin-bottom:10px}
  .teach .legend{display:flex; flex-wrap:wrap; gap:8px; margin:6px 0 14px}
  .teach .lg{font-size:14px; font-weight:700; padding:8px 12px; border-radius:10px;
             background:var(--panel); border:1px solid var(--line)}
  .lg.k{border-color:var(--kick)} .lg.s{border-color:var(--snare)}
  .lg.h{border-color:var(--hat)} .lg.o{border-color:var(--open)}
  .toggle{display:flex; align-items:center; justify-content:space-between;
          padding:18px; background:var(--panel); border:1px solid var(--line);
          border-radius:14px; margin-bottom:12px; font-size:18px; font-weight:700}
  .sw{width:64px; height:38px; border-radius:20px; background:var(--panel2);
      border:1px solid var(--line); position:relative; flex:0 0 auto}
  .sw::after{content:""; position:absolute; width:30px; height:30px; border-radius:50%;
             background:var(--dim); top:3px; left:3px; transition:left .15s, background .15s}
  .sw.on{background:var(--accent)} .sw.on::after{left:31px; background:#1a1206}
</style>
</head>
<body>

<header>
  <div class="logo">YEN's <span>Beatbox</span></div>
  <button class="menu-btn" id="btnTeach">How&nbsp;To</button>
</header>

<main>
  <div class="now">
    <div class="name" id="gName">—</div>
    <div class="meta" id="gMeta"></div>
  </div>

  <div class="stage">
    <div class="line" id="line"></div>
  </div>

  <div class="transport">
    <button class="play" id="play">▶ &nbsp;PLAY</button>

    <div class="stages" id="stages">
      <button data-st="0">Kick</button>
      <button data-st="1">+ Snare</button>
      <button data-st="2">+ Hat</button>
      <button data-st="3" class="sel">Full</button>
    </div>

    <div class="tempo">
      <button class="tbtn" id="tDown">−</button>
      <div class="tval"><span id="bpm">90</span> BPM<small id="tHint"></small></div>
      <button class="tbtn" id="tUp">+</button>
    </div>

    <div class="row">
      <button class="bigbtn" id="prevG">◀ Prev</button>
      <button class="bigbtn" id="ramp">Ramp: Off</button>
      <button class="bigbtn" id="nextG">Next ▶</button>
    </div>
  </div>
</main>

<!-- Teach / How-to panel -->
<div class="panel" id="panelT">
  <header>
    <div class="logo">How to Learn It</div>
    <button class="menu-btn" id="closeT">Done</button>
  </header>
  <div class="panel-body teach" id="teach"></div>
</div>

<script>
"use strict";

/* ============================================================
   THE LINEARIZER MODEL
   Solo beatbox is MONOPHONIC: one mouth, one sound per slot.
   A groove is a single time-ordered stream of mouth sounds.
   grid: steps per bar. 16 = straight 16ths. 12 = triplet/shuffle.
   slots[i] = null (silence) OR { snd, syl, swung? }
     snd: 'kick'|'snare'|'hat'|'open'
     syl: the spoken syllable shown big
   Build-up stages filter by sound, not by re-authoring.
   ============================================================ */

const SND = { kick:'k', snare:'s', hat:'h', open:'o' };

function S(snd, syl){ return { snd, syl }; }
const _ = null; // silence / breath

const GROOVES = [
  {
    name:"Boots & Cats", style:"Foundation", grid:16,
    start:80, target:104,
    // kick 1&3, snare 2&4, hat ONLY on the &'s (interleaved, never stacked)
    slots:[ S('kick','Boots'), _, S('hat','n'), _,
            S('snare','Cats'), _, S('hat','n'), _,
            S('kick','Boots'), _, S('hat','n'), _,
            S('snare','Cats'), _, S('hat','n'), _ ],
    teach:{
      what:"The Rosetta Stone. Everything else is a variation of this. Notice the hi-hat never lands on top of the kick or snare — it only speaks on the off-beats (the \"n\"). On a drum chart the hat is on every 8th; in your mouth you drop the ones under the kick and snare and the ear fills them in. That single idea is 90% of solo beatboxing.",
      how:"Say it out loud first, no drum sounds: \"Boots-n-Cats-n.\" Then make the B voiceless (no vocal cord) and the C a throat K. Loop the kick alone, then +Snare, then +Hat. Ramp tempo only once it's clean."
    }
  },
  {
    name:"Folk Brush", style:"Folk · solo acoustic", grid:16,
    start:70, target:96,
    slots:[ S('kick','dum'), _, S('hat','t'), _,
            S('snare','pff'), _, S('hat','t'), _,
            S('kick','dum'), _, S('hat','t'), _,
            S('snare','pff'), _, S('hat','t'), _ ],
    teach:{
      what:"The James Taylor / Jackson Browne sideman feel — the bed under your own guitar loop. Same skeleton as Boots & Cats but soft: a felt kick (\"dum\"), a brushed snare (\"pff\" — air through nearly-closed lips, no hard K), whisper hats. Restraint IS the technique. If it competes with the guitar you've already lost.",
      how:"Practice the \"pff\" brush in isolation until it's airy and consistent. Keep dynamics low. This is the one you'll actually use at Landmark in July — drill it at gig tempo and below until it's boring."
    }
  },
  {
    name:"Basic Rock", style:"Rock", grid:16,
    start:88, target:124,
    // textbook backbeat: kick 1&3, snare 2&4, hat on the &'s. nothing else.
    slots:[ S('kick','Boom'), _, S('hat','ts'), _,
            S('snare','Kah'), _, S('hat','ts'), _,
            S('kick','Boom'), _, S('hat','ts'), _,
            S('snare','Kah'), _, S('hat','ts'), _ ],
    teach:{
      what:"The textbook rock backbeat — the full-kit version of Boots & Cats with hard articulation. Kick on 1 & 3, cracking snare on 2 & 4, nothing fancy. The SPACE between the two kicks is what makes it rock; fill it and it becomes disco. Half the records you've ever played live are this and only this.",
      how:"Drill it dead clean and resist embellishing. Once it's locked, the one variation worth adding is a kick on the 'a of 4' (the very last 16th) to launch the next bar — but that's a fast double-kick into the downbeat, so add it only after the plain beat is automatic."
    }
  },
  {
    name:"Country Two-Step", style:"Country", grid:12,
    start:104, target:140,
    // SHUFFLED — Western swing / dancehall two-step rides a triplet, not straight
    slots:[ S('kick','Boom'), _, S('hat','ka'),
            S('snare','Chick'), _, S('hat','ka'),
            S('kick','Boom'), _, S('hat','ka'),
            S('snare','Chick'), _, S('hat','ka') ],
    teach:{
      what:"The dancehall two-step — and here's the thing most people get wrong: it SHUFFLES. Western swing, Bob Wills, the floor at any honky-tonk — that two-step rides a triplet, not a straight 8th. \"Boom-ka Chick-ka.\" Same shuffle skeleton as the blues, just faster and brighter. Play it straight and the dancers feel it instantly.",
      how:"If Shuffle Blues is solid, this is that gallop sped up and lightened. Lock the triplet first at a slow tempo, then ramp — the failure mode at speed is straightening into a polka. Keep the long-short alive all the way up."
    }
  },
  {
    name:"Country Train", style:"Country · advanced", grid:16,
    start:96, target:130,
    // kick 1&3, 16th snare roll, with the 2 & 4 BACKBEAT accented out of the roll
    slots:[ S('kick','B'), S('snare','d'), S('snare','g'), S('snare','d'),
            S('snare','KA'), S('snare','d'), S('snare','g'), S('snare','d'),
            S('kick','B'), S('snare','d'), S('snare','g'), S('snare','d'),
            S('snare','KA'), S('snare','d'), S('snare','g'), S('snare','d') ],
    teach:{
      what:"The Bakersfield train beat. Two things make it a train and not a buzz: the continuous 16th snare roll (the wheels) AND the backbeat punching OUT of that roll on 2 & 4 (the \"KA\"). Drop the accent and it's just noise; drop the roll and it's a two-step. In the mouth the roll is a fast alternating \"d-g-d-g\" (front/back of tongue) with a hard \"KA\" landing on 2 & 4.",
      how:"Build the even \"d-g-d-g\" roll alone first, slow, until it runs forever. Then learn to pop the \"KA\" louder on 2 & 4 without breaking the roll's evenness — that's the real skill. Kick on 1 & 3 goes in last. Weeks, not minutes."
    }
  },
  {
    name:"Shuffle Blues", style:"Blues · priority", grid:12,
    start:84, target:118,
    // triplet: 1st & 3rd of each beat. kick 1&3, snare 2&4, shuffle on the rest
    slots:[ S('kick','Doo'), _, S('hat','ka'),
            S('snare','Cat'), _, S('hat','ka'),
            S('kick','Doo'), _, S('hat','ka'),
            S('snare','Cat'), _, S('hat','ka') ],
    teach:{
      what:"The 12/8 shuffle — the backbone of every blues you play. The middle of each triplet stays silent (that's the swing gap). The whole bar is just \"Doo-ka Cat-ka Doo-ka Cat-ka.\" Say it as a lazy gallop, never straight.",
      how:"Speak the gallop until it swings without thinking. The trap is straightening the triplet under pressure — drill it slow and exaggerate the long-short. This + Slow Blues are your top two."
    }
  },
  {
    name:"Slow Blues 12/8", style:"Blues · priority", grid:12,
    start:54, target:72,
    // slow enough to articulate all 3 triplet notes
    slots:[ S('kick','Boom'), S('hat','da'), S('hat','da'),
            S('snare','Crack'), S('hat','da'), S('hat','da'),
            S('kick','Boom'), S('hat','da'), S('hat','da'),
            S('snare','Crack'), S('hat','da'), S('hat','da') ],
    teach:{
      what:"Albert King / B.B. King territory. So slow you can voice every triplet: \"Boom-da-da Crack-da-da.\" The space between notes is the whole feel — rush it and the blues evaporates.",
      how:"Start at the triplet pulse alone (\"da-da-da-da...\") to internalize the 12/8. Add the kick on each beat-1, then the snare backbeats. Stay relaxed and behind the click; this pattern punishes any hurry."
    }
  },
  {
    name:"Jazz Swing", style:"Jazz · priority", grid:12,
    start:96, target:168,
    // the ride: ding / ding-da / ding / ding-da. mouth = ride only; comp is off-grid
    slots:[ S('hat','Ting'), _, _,
            S('hat','Ting'), _, S('hat','da'),
            S('hat','Ting'), _, _,
            S('hat','Ting'), _, S('hat','da') ],
    teach:{
      what:"Spang-a-lang. The honest mouth version of jazz swing is just the ride cymbal: \"Ting — Ting-da — Ting — Ting-da.\" The feathered kick and the snare comping are off the grid and inaudible at volume — chasing them solo is a trap. Own the ride and the rest is implied.",
      how:"This is pure time-feel. Loop the ride at a medium tempo and lock it like a metronome, then push toward 168. Use a bright \"Ts/Ting\" — tongue tip, short, with the \"da\" swung late. Don't add anything until the ride is unshakeable."
    }
  },
  {
    name:"Funk: On the One", style:"Funk", grid:16,
    start:84, target:112,
    // JB minimal: ONE huge kick on 1, snare 2&4, 16th hats, lone anticipation
    // kick on the 'a of 4' pulling back to the 1. no square beat-3 kick.
    slots:[ S('kick','BUMP'), S('hat','t'), S('hat','t'), S('hat','t'),
            S('snare','Kat'), S('hat','t'), S('hat','t'), S('hat','t'),
            S('hat','t'), S('hat','t'), S('hat','t'), S('hat','t'),
            S('snare','Kat'), S('hat','t'), S('kick','d'), S('hat','t') ],
    teach:{
      what:"James Brown stripped to the bone. The \"1\" is the heaviest thing in the bar and everything resolves to it — so there's only ONE real kick (\"BUMP\"), nothing square on beat 3 to dilute it. Snare on 2 & 4, 16th hats chattering underneath. The single \"d\" kick on the 'a of 4' is an anticipation that slingshots you back into the next BUMP. That tension is the whole groove.",
      how:"Punch beat 1 harder than feels reasonable and lay everything else dead behind it. Practice the BUMP→(bar)→d→BUMP slingshot last; it's the part that makes it JB instead of rock. Nasty over fast — never rush it."
    }
  }
];

/* ============================================================
   AUDIO ENGINE — acoustic-leaning synthesis, tuned soft for car
   ============================================================ */
let AC = null;
function audio(){
  if(!AC){ AC = new (window.AudioContext||window.webkitAudioContext)(); }
  if(AC.state === 'suspended') AC.resume();
  return AC;
}
let noiseBuf = null;
function noise(){
  if(noiseBuf) return noiseBuf;
  const ac = audio(); const n = ac.sampleRate*0.5;
  noiseBuf = ac.createBuffer(1,n,ac.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=Math.random()*2-1;
  return noiseBuf;
}
function env(node, t, a, peak, d){
  node.gain.setValueAtTime(0.0001,t);
  node.gain.exponentialRampToValueAtTime(peak, t+a);
  node.gain.exponentialRampToValueAtTime(0.0001, t+a+d);
}
function kick(t, accent){
  const ac=audio(); const o=ac.createOscillator(), g=ac.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(accent?165:135, t);
  o.frequency.exponentialRampToValueAtTime(48, t+0.09);
  // soft click for acoustic beater attack
  const c=ac.createBufferSource(), cf=ac.createBiquadFilter(), cg=ac.createGain();
  c.buffer=noise(); cf.type='bandpass'; cf.frequency.value=1800;
  c.connect(cf); cf.connect(cg); cg.connect(ac.destination);
  env(cg, t, 0.001, accent?0.18:0.12, 0.02); c.start(t); c.stop(t+0.05);
  o.connect(g); g.connect(ac.destination);
  env(g, t, 0.004, accent?1.0:0.7, 0.16); o.start(t); o.stop(t+0.22);
}
function snare(t, type, amp){
  const ac=audio(); amp = amp || 1;
  // tonal body
  const o=ac.createOscillator(), og=ac.createGain();
  o.type='triangle'; o.frequency.value= type==='brush'?210:185;
  o.connect(og); og.connect(ac.destination);
  env(og, t, 0.002, (type==='brush'?0.18:0.32)*amp, type==='brush'?0.12:0.14);
  o.start(t); o.stop(t+0.2);
  // noise crack / brush wash
  const n=ac.createBufferSource(), f=ac.createBiquadFilter(), ng=ac.createGain();
  n.buffer=noise(); f.type= type==='brush'?'lowpass':'highpass';
  f.frequency.value= type==='brush'?3800:1500;
  n.connect(f); f.connect(ng); ng.connect(ac.destination);
  env(ng, t, 0.002, (type==='brush'?0.34:0.6)*amp, type==='brush'?0.18:0.16);
  n.start(t); n.stop(t+0.25);
}
function hat(t, open){
  const ac=audio(); const n=ac.createBufferSource(),
        f=ac.createBiquadFilter(), g=ac.createGain();
  n.buffer=noise(); f.type='highpass'; f.frequency.value=8200;
  // gentle lowpass shelf so it isn't an ice-pick in a car
  const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=15000;
  n.connect(f); f.connect(lp); lp.connect(g); g.connect(ac.destination);
  env(g, t, 0.001, open?0.4:0.34, open?0.28:0.045);
  n.start(t); n.stop(t+(open?0.4:0.09));
}
function voice(snd, t, accent){
  if(snd==='kick') kick(t,accent);
  else if(snd==='snare') snare(t, accent==='brush'?'brush':'hard', accent===true?1.6:1);
  else if(snd==='hat') hat(t,false);
  else if(snd==='open') hat(t,true);
}
function click(t, hi){
  const ac=audio(); const o=ac.createOscillator(), g=ac.createGain();
  o.type='square'; o.frequency.value= hi?2000:1200;
  o.connect(g); g.connect(ac.destination);
  env(g,t,0.001,0.25,0.04); o.start(t); o.stop(t+0.06);
}

/* ============================================================
   SCHEDULER + STATE
   ============================================================ */
const st = {
  gi:0, bpm:90, stage:3, playing:false, ramp:false,
  step:0, nextTime:0, timer:null, countIn:false, countStep:0,
  q:[]
};
const STAGE_SND = [ ['kick'], ['kick','snare'], ['kick','snare','hat','open'],
                    ['kick','snare','hat','open'] ];
function audibleAt(stage){
  return stage===2 ? ['kick','snare','hat','open'] : STAGE_SND[stage];
}
function curG(){ return GROOVES[st.gi]; }
function stepDur(){
  const g=curG();
  return g.grid===12 ? (60/st.bpm/3) : (60/st.bpm/4);
}

function buildLine(){
  const g=curG(), line=document.getElementById('line');
  line.innerHTML='';
  const aud = audibleAt(st.stage);
  g.slots.forEach((s,i)=>{
    const d=document.createElement('div');
    if(!s){ d.className='syl rest'; d.textContent='·'; }
    else{
      d.className='syl '+SND[s.snd];
      d.textContent=s.syl;
      if(aud.indexOf(s.snd)===-1) d.classList.add('muted');
    }
    d.dataset.i=i;
    line.appendChild(d);
  });
}
function refreshHeader(){
  const g=curG();
  document.getElementById('gName').textContent=g.name;
  document.getElementById('gMeta').textContent =
     g.style+'  ·  '+(g.grid===12?'shuffle/triplet':'straight')+
     '  ·  target '+g.target;
  document.getElementById('bpm').textContent=st.bpm;
  const hint=document.getElementById('tHint');
  hint.textContent = st.bpm<g.target ? ('build to '+g.target) :
                     (st.bpm>g.target ? 'above target' : 'at target');
}
function setGroove(i){
  st.gi=(i+GROOVES.length)%GROOVES.length;
  st.bpm=curG().start;
  st.step=0;
  refreshHeader(); buildLine();
}
function setStage(s){
  st.stage=s;
  document.querySelectorAll('#stages button').forEach(b=>
    b.classList.toggle('sel', +b.dataset.st===s));
  buildLine();
}

function scheduler(){
  const ac=audio();
  while(st.nextTime < ac.currentTime + 0.12){
    const g=curG();
    if(st.countIn){
      const beats = g.grid===12?4:4;
      click(st.nextTime, st.countStep===0);
      st.q.push({t:st.nextTime, count:st.countStep});
      st.countStep++;
      st.nextTime += 60/st.bpm; // count-in in quarter notes
      if(st.countStep>=beats){ st.countIn=false; st.countStep=0; st.step=0; }
      continue;
    }
    const s=g.slots[st.step];
    const aud=audibleAt(st.stage);
    if(s && aud.indexOf(s.snd)!==-1){
      const accent = (g.name==='Funk: On the One' && st.step===0) ? true :
                     (g.name==='Country Train' && (st.step===4 || st.step===12)) ? true :
                     (g.name==='Folk Brush' && s.snd==='snare') ? 'brush' : false;
      voice(s.snd, st.nextTime, accent);
    }
    st.q.push({t:st.nextTime, i:st.step});
    const prev=st.step;
    st.step=(st.step+1) % g.slots.length;
    st.nextTime += stepDur();
    if(prev === g.slots.length-1 && st.ramp && st.bpm < g.target){
      st.bpm=Math.min(g.target, st.bpm+2);
      document.getElementById('bpm').textContent=st.bpm;
      refreshHeader();
    }
  }
}
function visual(){
  if(!st.playing) return;
  const ac=audio();
  while(st.q.length && st.q[0].t <= ac.currentTime){
    const e=st.q.shift();
    if(e.i!==undefined){
      document.querySelectorAll('.syl.on').forEach(x=>x.classList.remove('on'));
      const el=document.querySelector('.syl[data-i="'+e.i+'"]');
      if(el && !el.classList.contains('rest') && !el.classList.contains('muted'))
        el.classList.add('on');
    }
  }
  requestAnimationFrame(visual);
}
function play(){
  audio();
  st.playing=true; st.countIn=true; st.countStep=0; st.step=0; st.q=[];
  st.nextTime=audio().currentTime+0.1;
  const b=document.getElementById('play');
  b.classList.add('playing'); b.innerHTML='■ &nbsp;STOP';
  st.timer=setInterval(scheduler,25);
  requestAnimationFrame(visual);
}
function stop(){
  st.playing=false; clearInterval(st.timer); st.timer=null;
  const b=document.getElementById('play');
  b.classList.remove('playing'); b.innerHTML='▶ &nbsp;PLAY';
  document.querySelectorAll('.syl.on').forEach(x=>x.classList.remove('on'));
}

/* ============================================================
   UI WIRING
   ============================================================ */
document.getElementById('play').onclick=()=> st.playing?stop():play();
document.getElementById('tDown').onclick=()=>{ st.bpm=Math.max(40,st.bpm-2); refreshHeader(); };
document.getElementById('tUp').onclick=()=>{ st.bpm=Math.min(220,st.bpm+2); refreshHeader(); };
document.getElementById('prevG').onclick=()=>{ const p=st.playing; stop(); setGroove(st.gi-1); if(p)play(); };
document.getElementById('nextG').onclick=()=>{ const p=st.playing; stop(); setGroove(st.gi+1); if(p)play(); };
document.getElementById('ramp').onclick=function(){
  st.ramp=!st.ramp; this.textContent='Ramp: '+(st.ramp?'On':'Off');
  this.style.background = st.ramp ? 'var(--accent)' : '';
  this.style.color = st.ramp ? '#1a1206' : '';
};
document.querySelectorAll('#stages button').forEach(b=>
  b.onclick=()=> setStage(+b.dataset.st));

// Teach panel — opened by tapping the groove name or the How-To button
const pT=document.getElementById('panelT');
function buildTeach(){
  const g=curG(), t=document.getElementById('teach');
  const used=[...new Set(g.slots.filter(Boolean).map(s=>s.snd))];
  const lbl={kick:'Kick',snare:'Snare',hat:'Hi-Hat',open:'Open Hat'};
  t.innerHTML =
    '<h3>'+g.name+'</h3>'+
    '<div class="legend">'+used.map(s=>'<span class="lg '+SND[s]+'">'+lbl[s]+'</span>').join('')+'</div>'+
    '<h3>What it is</h3><p>'+g.teach.what+'</p>'+
    '<h3>How to learn it</h3><p>'+g.teach.how+'</p>'+
    '<h3>The build-up</h3><p>Use the stage buttons: loop <b>Kick</b> alone until it\'s strong, then <b>+Snare</b>, then <b>+Hat</b>, then <b>Full</b>. Start at '+g.start+', flip <b>Ramp</b> on, and it walks you to '+g.target+'.</p>';
}
document.getElementById('gName').onclick=()=>{ buildTeach(); pT.classList.add('open'); };
document.getElementById('gMeta').onclick=()=>{ buildTeach(); pT.classList.add('open'); };
document.getElementById('btnTeach').onclick=()=>{ buildTeach(); pT.classList.add('open'); };
document.getElementById('closeT').onclick=()=> pT.classList.remove('open');
